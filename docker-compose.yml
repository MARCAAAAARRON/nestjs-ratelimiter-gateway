services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RATE_LIMIT_WINDOW_MS=60000
      - RATE_LIMIT_MAX_REQUESTS=5
      - BACKEND_URL=http://mock-backend:4000
    depends_on:
      - redis
      - mock-backend

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  mock-backend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./mock-backend.js:/app/mock-backend.js
    command: node mock-backend.js
    ports:
      - "4000:4000"